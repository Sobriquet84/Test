<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Learning Finder</title>

<style>
  :root {
    --blue-500: #0559FA;
    --blue-250: #82ACFC;
    --blue-100: #DAE6FE;
    --blue-900: #06195E;
    --purple-500: #5827E3;
    --orangellow-300: #F6B942;
    --text-primary: #1a1f3a;
    --text-secondary: #4a5070;
    --text-muted: #7a82a0;
    --border: #e2e6f0;
    --bg: #f5f7fc;
    --card-bg: #ffffff;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Gelion', sans-serif;
    background: var(--bg);
    color: var(--text-primary);
    min-height: 100vh;
  }

  .page-wrap {
    max-width: 960px;
    margin: 0 auto;
    padding: 0 24px 80px;
  }

  /* Header */
  header {
    padding: 40px 0 32px;
    border-bottom: 1px solid var(--border);
    margin-bottom: 32px;
    display: flex;
    align-items: center;
    gap: 14px;
  }

  .logo-mark {
    width: 40px;
    height: 40px;
    border-radius: 10px;
    background: linear-gradient(135deg, var(--blue-500), var(--purple-500));
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Gelion', sans-serif;
    font-weight: 800;
    font-size: 18px;
    color: #fff;
    flex-shrink: 0;
  }

  .header-text h1 {
    font-family: 'Gelion', sans-serif;
    font-weight: 800;
    font-size: 24px;
    color: var(--text-primary);
    letter-spacing: -0.01em;
  }

  .header-text p {
    font-size: 13px;
    color: var(--text-muted);
    margin-top: 2px;
  }

  /* Nav */
  nav {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    margin-bottom: 28px;
  }

  .nav-btn {
    font-family: 'Gelion', sans-serif;
    font-weight: 500;
    font-size: 13px;
    padding: 7px 16px;
    border-radius: 6px;
    cursor: pointer;
    transition: all 0.15s ease;
    outline: none;
    border: 1px solid var(--border);
    background: var(--card-bg);
    color: var(--text-secondary);
  }

  .nav-btn:hover {
    border-color: var(--blue-250);
    color: var(--blue-500);
  }

  .nav-btn.active {
    background: var(--blue-500);
    border-color: var(--blue-500);
    color: #fff;
  }

  .nav-btn .pill-count {
    display: inline-block;
    margin-left: 6px;
    background: rgba(255,255,255,0.25);
    border-radius: 20px;
    padding: 0 7px;
    font-size: 11px;
  }

  .nav-btn:not(.active) .pill-count {
    background: var(--blue-100);
    color: var(--blue-500);
  }

  /* Section header */
  .section-header {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 18px;
  }

  .section-title {
    font-family: 'Gelion', sans-serif;
    font-size: 17px;
    font-weight: 700;
    color: var(--text-primary);
  }

  .section-tag {
    font-size: 11px;
    font-weight: 500;
    padding: 3px 10px;
    border-radius: 20px;
    background: var(--blue-100);
    color: var(--blue-500);
  }

  /* Skills list */
  .skills-grid {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  /* Skill card — no overflow:hidden, so dropdowns can escape */
  .skill-card {
    background: var(--card-bg);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 20px 22px 16px;
    transition: border-color 0.18s, box-shadow 0.18s;
    position: relative;
  }

  .skill-card:hover {
    border-color: var(--blue-250);
    box-shadow: 0 2px 12px rgba(5,89,250,0.07);
  }

  .skill-name {
    font-family: 'Gelion', sans-serif;
    font-size: 16px;
    font-weight: 700;
    color: var(--text-primary);
    margin-bottom: 6px;
  }

  .skill-desc {
    font-size: 13.5px;
    line-height: 1.6;
    color: var(--text-secondary);
    margin-bottom: 12px;
    max-width: 720px;
  }

  /* Objectives toggle */
  .obj-toggle {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    font-size: 12px;
    font-weight: 500;
    color: var(--blue-500);
    cursor: pointer;
    user-select: none;
  }

  .obj-toggle:hover { text-decoration: underline; }
  .obj-toggle svg { transition: transform 0.2s ease; }
  .obj-toggle.open svg { transform: rotate(180deg); }

  .objectives-panel {
    overflow: hidden;
    max-height: 0;
    transition: max-height 0.3s ease, opacity 0.25s ease;
    opacity: 0;
  }

  .objectives-panel.open {
    max-height: 300px;
    opacity: 1;
  }

  .objectives-list {
    margin-top: 10px;
    padding: 12px 14px;
    background: var(--bg);
    border-radius: 7px;
    border: 1px solid var(--border);
    list-style: none;
    display: flex;
    flex-direction: column;
    gap: 6px;
    margin-bottom: 12px;
  }

  .objectives-list li {
    font-size: 13px;
    color: var(--text-secondary);
    line-height: 1.5;
    display: flex;
    gap: 8px;
  }

  .objectives-list li::before {
    content: '›';
    color: var(--blue-500);
    font-weight: 700;
    flex-shrink: 0;
  }

  /* Actions */
  .card-divider {
    height: 1px;
    background: var(--border);
    margin: 14px 0 12px;
  }

  .actions {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    align-items: flex-start;
  }

  .btn-wrap {
    position: relative;
  }

  .action-btn {
    font-family: 'Gelion', sans-serif;
    font-size: 12px;
    font-weight: 500;
    padding: 6px 13px;
    border-radius: 6px;
    border: 1px solid var(--border);
    background: var(--card-bg);
    color: var(--text-secondary);
    cursor: pointer;
    display: inline-flex;
    align-items: center;
    gap: 5px;
    transition: all 0.15s ease;
    outline: none;
    white-space: nowrap;
  }

  .action-btn:hover, .action-btn.open {
    border-color: var(--blue-500);
    color: var(--blue-500);
    background: var(--blue-100);
  }

  .btn-udemy {
    color: #8a5000;
    border-color: #f0d890;
    background: #fffdf0;
  }

  .btn-udemy:hover {
    border-color: var(--orangellow-300);
    background: #fff8d0;
    color: #6a3a00;
  }

  .caret { transition: transform 0.18s ease; }
  .action-btn.open .caret { transform: rotate(180deg); }

  /* Dropdown floats above all sibling cards */
  .dropdown {
    position: absolute;
    top: calc(100% + 5px);
    left: 0;
    min-width: 250px;
    background: #fff;
    border: 1px solid var(--border);
    border-radius: 8px;
    box-shadow: 0 6px 24px rgba(0,0,0,0.11);
    z-index: 9999;
    opacity: 0;
    transform: translateY(-5px);
    pointer-events: none;
    transition: opacity 0.15s ease, transform 0.15s ease;
  }

  .dropdown.open {
    opacity: 1;
    transform: translateY(0);
    pointer-events: all;
  }

  .dropdown-label {
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.07em;
    text-transform: uppercase;
    color: var(--text-muted);
    padding: 10px 13px 5px;
  }

  .dropdown a {
    display: flex;
    align-items: flex-start;
    gap: 7px;
    padding: 8px 13px;
    font-size: 13px;
    color: var(--text-primary);
    text-decoration: none;
    transition: background 0.1s;
    border-top: 1px solid var(--border);
    line-height: 1.4;
  }

  .dropdown a:hover {
    background: var(--blue-100);
    color: var(--blue-500);
  }

  .dropdown a::before {
    content: '›';
    color: var(--blue-250);
    font-weight: 700;
    flex-shrink: 0;
    margin-top: 1px;
  }

  /* Empty state */
  .empty-state {
    text-align: center;
    padding: 60px 20px;
    color: var(--text-muted);
    font-size: 14px;
  }

  .empty-state .icon { font-size: 32px; display: block; margin-bottom: 10px; }
</style>
</head>
<body>
<div class="page-wrap">
  <header>
    <div class="logo-mark">L</div>
    <div class="header-text">
      <h1>Learning Finder</h1>
      <p>Curated learning paths for professional growth</p>
    </div>
  </header>

  <nav id="groupNav"></nav>
  <div id="contentArea"></div>
</div>

<script>
const data = {
  groups: [
    {
      id: 'sales',
      label: 'Sales Skills',
      skills: [
        {
          name: 'Consultative Selling',
          description: "A customer-first approach that prioritizes understanding a buyer's business challenges before presenting solutions. Rather than pitching products, consultative sellers act as trusted advisors who diagnose needs and co-create value.",
          objectives: [
            'Apply a structured discovery framework to uncover customer pain points, goals, and decision criteria',
            'Shift conversations from product features to business outcomes',
            'Build trust through active listening and insightful questioning',
            'Tailor solution recommendations to the specific context of each buyer'
          ],
          deep: [
            { label: 'Sales Skills: Consultative Selling Master Class', url: 'https://atlasinternal.udemy.com/course/sales-skills-consultative-selling-master-class' },
            { label: 'Sell More by Talking Less', url: 'https://atlasinternal.udemy.com/course/sell-more-by-talking-less/' }
          ],
          quick: [
            { label: 'Sell More by Talking Less', url: 'https://atlasinternal.udemy.com/course/sell-more-by-talking-less/' }
          ]
        },
        {
          name: 'Value Proposition Design',
          description: 'The craft of articulating why a solution matters to a specific buyer in a way that is clear, differentiated, and compelling. A strong value proposition connects what you offer to what the customer actually cares about.',
          objectives: [
            'Map customer jobs, pains, and gains to product or service capabilities',
            'Craft value statements that are specific, measurable, and buyer-relevant',
            'Differentiate from competitors by highlighting unique strengths in context',
            'Adapt the value proposition for different industries, roles, and use cases'
          ],
          deep: [
            { label: 'Value Proposition Mastery', url: 'https://atlasinternal.udemy.com/course/value-proposition-mastery/' }
          ],
          quick: [
            { label: 'Sales Skills: Value Propositions', url: 'https://atlasinternal.udemy.com/course/sales-skills-value-propositions/' }
          ]
        },
        {
          name: 'Business Storytelling',
          description: 'The ability to make data, solutions, and ideas memorable by wrapping them in narrative. Stories create emotional resonance, simplify complexity, and drive action far more effectively than facts alone.',
          objectives: [
            'Structure compelling sales narratives using proven storytelling frameworks',
            'Use customer success stories and case studies to build credibility and relatability',
            'Replace feature-and-benefit lists with problem-solution-outcome narratives',
            "Tailor stories to the audience's role, industry, and stage in the buying journey"
          ],
          deep: [
            { label: 'The Complete Storytelling Course for Speaking & Presenting', url: 'https://atlasinternal.udemy.com/course/the-complete-storytelling-course-for-speaking-presenting/' }
          ],
          quick: [
            { label: 'Storytelling to Influence', url: 'https://atlasinternal.udemy.com/course/storytellingtoinfluence/' }
          ]
        },
        {
          name: 'Persuasion and Influence',
          description: 'The ability to shape thinking, build buy-in, and move people to action — without relying on pressure or manipulation. This skill draws on psychology, framing, and credibility to guide buyers toward confident decisions.',
          objectives: [
            'Apply core principles of influence (reciprocity, social proof, authority, etc.) ethically in sales contexts',
            'Frame information to align with what buyers value most',
            'Build consensus across multiple stakeholders with competing priorities',
            'Recognize and navigate the emotional drivers behind purchasing decisions'
          ],
          deep: [
            { label: 'Persuasion Psychology & Influence', url: 'https://atlasinternal.udemy.com/course/persuasion-psychology-influence/' }
          ],
          quick: [
            { label: 'Persuasion Mastery', url: 'https://atlasinternal.udemy.com/course/persuasion-mastery-/' }
          ]
        },
        {
          name: 'Objection Handling',
          description: 'The skill of addressing buyer concerns in a way that advances rather than stalls the sale. Effective objection handling treats resistance as a signal of interest and an opportunity to deepen dialogue.',
          objectives: [
            'Identify and categorize common objection types (price, timing, competition, risk)',
            'Use a structured response technique to acknowledge, clarify, and resolve concerns',
            'Distinguish between genuine objections and stalling tactics',
            'Turn objections into opportunities to reinforce value'
          ],
          deep: [
            { label: 'Sales Objections Simplified', url: 'https://atlasinternal.udemy.com/course/sales-objections-simplified/' }
          ],
          quick: [
            { label: 'Sales Training: Handling Objections', url: 'https://atlasinternal.udemy.com/course/sales-training-handling-objections/' }
          ]
        },
        {
          name: 'Negotiation',
          description: 'The discipline of reaching agreements that protect margin, preserve relationships, and create mutual value. Strong negotiators are prepared, disciplined, and skilled at finding creative paths to yes.',
          objectives: [
            'Prepare thoroughly by identifying interests, priorities, and walk-away positions for both sides',
            'Use principled negotiation techniques to move beyond positional bargaining',
            'Manage concessions strategically to protect deal value',
            'Resolve impasses and close agreements while maintaining long-term relationships'
          ],
          deep: [
            { label: 'Negotiations', url: 'https://atlasinternal.udemy.com/course/negotiations/' }
          ],
          quick: [
            { label: 'A Practical Guide to Negotiating', url: 'https://atlasinternal.udemy.com/course/a-practical-guide-to-negotiating/' }
          ]
        },
        {
          name: 'Executive Presence',
          description: 'The ability to command credibility, communicate with authority, and instill confidence in senior stakeholders. It encompasses how a seller carries themselves, structures their message, and holds the room under pressure.',
          objectives: [
            'Project confidence and composure in high-stakes executive meetings',
            'Adapt communication style and language to C-suite audiences',
            'Deliver concise, insight-driven messages that respect executive time',
            'Handle challenging questions and pushback with poise'
          ],
          deep: [
            { label: 'Selling with Emotional Intelligence', url: 'https://atlasinternal.udemy.com/course/selling-with-emotional-intelligence/' }
          ],
          quick: [
            { label: 'Persuasion Mastery', url: 'https://atlasinternal.udemy.com/course/persuasion-mastery-/' }
          ]
        },
        {
          name: 'Financial Acumen',
          description: 'The ability to understand and speak the language of business finance — enabling sellers to connect their solution to metrics that matter to economic buyers and quantify the return on investment.',
          objectives: [
            'Interpret key financial statements and metrics (P&L, EBITDA, ROI, payback period)',
            'Build and present a credible business case for investment',
            'Link solution benefits to measurable financial outcomes for the customer',
            'Engage confidently with finance-oriented stakeholders on budget and cost justification'
          ],
          deep: [
            { label: 'Introduction to Financial Controls', url: 'https://atlasinternal.udemy.com/course/introduction-to-financial-controls/' }
          ],
          quick: [
            { label: 'Financial Analysis', url: 'https://atlasinternal.udemy.com/course/financial-analysis-2/' }
          ]
        }
      ]
    }
  ]
};

let activeGroup = null;
let openDropdowns = {};

const caretSVG = () => `<svg class="caret" width="11" height="11" viewBox="0 0 11 11" fill="none"><path d="M2 4L5.5 7.5L9 4" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"/></svg>`;
const externalSVG = () => `<svg width="10" height="10" viewBox="0 0 10 10" fill="none"><path d="M2 8L8 2M8 2H4M8 2V6" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg>`;
const chevSVG = () => `<svg width="12" height="12" viewBox="0 0 12 12" fill="none"><path d="M2.5 4.5L6 8L9.5 4.5" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"/></svg>`;

function renderNav() {
  document.getElementById('groupNav').innerHTML =
    data.groups.map(g => `
      <button class="nav-btn ${activeGroup === g.id ? 'active' : ''}" onclick="selectGroup('${g.id}')">
        ${g.label}<span class="pill-count">${g.skills.length}</span>
      </button>`).join('') +
    `<button class="nav-btn" style="opacity:0.4;cursor:default;" disabled>More coming soon…</button>`;
}

function selectGroup(id) {
  activeGroup = activeGroup === id ? null : id;
  openDropdowns = {};
  renderNav();
  renderContent();
}

function toggleDropdown(cardIdx, type, event) {
  event.stopPropagation();
  const key = `${cardIdx}-${type}`;
  const isCurrentlyOpen = !!openDropdowns[key];

  // Close all dropdowns in DOM
  document.querySelectorAll('.btn-wrap').forEach(wrap => {
    const btn = wrap.querySelector('.action-btn[data-key]');
    const dd = wrap.querySelector('.dropdown');
    if (btn && dd) { btn.classList.remove('open'); dd.classList.remove('open'); }
  });
  openDropdowns = Object.fromEntries(Object.entries(openDropdowns).filter(([k]) => k.startsWith('obj-')));

  // If it wasn't open before, open it now
  if (!isCurrentlyOpen) {
    openDropdowns[key] = true;
    const btn = document.querySelector(`.action-btn[data-key="${key}"]`);
    const dd = btn?.closest('.btn-wrap')?.querySelector('.dropdown');
    if (btn) btn.classList.add('open');
    if (dd) dd.classList.add('open');
  }
}

function syncDropdownDOM() {
  // no-op kept for safety
}

function toggleObjectives(i) {
  const key = `obj-${i}`;
  openDropdowns[key] = !openDropdowns[key];
  document.getElementById(`obj-panel-${i}`)?.classList.toggle('open', !!openDropdowns[key]);
  document.getElementById(`obj-toggle-${i}`)?.classList.toggle('open', !!openDropdowns[key]);
}

function renderContent() {
  const area = document.getElementById('contentArea');
  if (!activeGroup) {
    area.innerHTML = `<div class="empty-state"><span class="icon">📚</span>Select a skill group above to explore learning paths.</div>`;
    return;
  }
  const group = data.groups.find(g => g.id === activeGroup);
  area.innerHTML = `
    <div class="section-header">
      <span class="section-title">${group.label}</span>
      <span class="section-tag">${group.skills.length} skills</span>
    </div>
    <div class="skills-grid">
      ${group.skills.map((skill, i) => `
        <div class="skill-card">
          <div class="skill-name">${skill.name}</div>
          <div class="skill-desc">${skill.description}</div>
          <span class="obj-toggle" id="obj-toggle-${i}" onclick="toggleObjectives(${i})">
            ${chevSVG()} Learning objectives (${skill.objectives.length})
          </span>
          <div class="objectives-panel" id="obj-panel-${i}">
            <ul class="objectives-list">
              ${skill.objectives.map(o => `<li>${o}</li>`).join('')}
            </ul>
          </div>
          <div class="card-divider"></div>
          <div class="actions">
            <div class="btn-wrap">
              <button class="action-btn" data-key="${i}-deep" onclick="toggleDropdown(${i},'deep',event)">
                Deep Dive ${caretSVG()}
              </button>
              <div class="dropdown">
                <div class="dropdown-label">Deep Dive</div>
                ${skill.deep.map(l => `<a href="${l.url}" target="_blank">${l.label}</a>`).join('')}
              </div>
            </div>
            <div class="btn-wrap">
              <button class="action-btn" data-key="${i}-quick" onclick="toggleDropdown(${i},'quick',event)">
                Quick Learn ${caretSVG()}
              </button>
              <div class="dropdown">
                <div class="dropdown-label">Quick Learn</div>
                ${skill.quick.map(l => `<a href="${l.url}" target="_blank">${l.label}</a>`).join('')}
              </div>
            </div>
            <a href="https://atlasinternal.udemy.com/organization/search/?q=${encodeURIComponent(skill.name)}" target="_blank" style="text-decoration:none;">
              <button class="action-btn btn-udemy">Find in Udemy ${externalSVG()}</button>
            </a>
          </div>
        </div>
      `).join('')}
    </div>
  `;

  // restore open objective panels after re-render
  group.skills.forEach((_, i) => {
    if (openDropdowns[`obj-${i}`]) {
      document.getElementById(`obj-panel-${i}`)?.classList.add('open');
      document.getElementById(`obj-toggle-${i}`)?.classList.add('open');
    }
  });
}

document.addEventListener('click', e => {
  if (!e.target.closest('.btn-wrap')) {
    let changed = false;
    Object.keys(openDropdowns).forEach(k => {
      if (!k.startsWith('obj-') && openDropdowns[k]) { openDropdowns[k] = false; changed = true; }
    });
    if (changed) syncDropdownDOM();
  }
});

renderNav();
renderContent();
</script>
</body>
</html>
